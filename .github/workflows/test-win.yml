name: Test for Windows

on:
  - pull_request
  - push

# concurrency:
#   group: ${{ github.workflow }}-${{ (github.ref_name == 'main' && github.run_id) || format('{0}-{1}', github.actor, github.head_ref || github.ref_name) }}
#   cancel-in-progress: true

jobs:
  win-test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '^18.20.8'
            jest-opts: --reporters=default
          - node-version: '^20.20.0'
            jest-opts: --reporters=default --reporters=jest-junit
          - node-version: '22.23.1'
            jest-opts: --reporters=default --reporters=jest-junit
          - node-version: '^24.18.0'
            jest-opts: --reporters=default --reporters=jest-junit
          - node-version: '^26.4.0'
            jest-opts: --reporters=default --reporters=jest-junit

    steps:
      # - name: Output concurrency group
      #   run: echo "${{ github.workflow }}-${{ (github.ref_name == 'main' && github.run_id) || format('{0}-{1}', github.actor, github.head_ref || github.ref_name) }}"

      - name: Get number of CPU cores
        uses: SimenB/github-actions-cpu-cores@v3
        id: cpu-cores

      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up LibreOffice
        run: choco install libreoffice-fresh -y

      # Retry tests up to 3 times due to flaky tests on Windows CI
      # https://stackoverflow.com/a/59365905
      - name: Jest
        env:
          JEST_JUNIT_CLASSNAME: '{filepath}'
          JEST_JUNIT_OUTPUT_DIR: tmp/test-results
          MARP_TEST_CI: 1
        run: >-
          npm run test:coverage -- --ci --max-workers ${{ steps.cpu-cores.outputs.count }} ${{ matrix.jest-opts }} ||
          npm run test:coverage -- --ci --bail -i ${{ matrix.jest-opts }} ||
          npm run test:coverage -- --ci --bail -i ${{ matrix.jest-opts }} --no-cache ||
          npm run test:coverage -- --ci --bail -i ${{ matrix.jest-opts }} --no-cache

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage

      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows

      - uses: codecov/test-results-action@v1
        if: ${{ !cancelled() && contains(matrix.jest-opts, 'jest-junit') }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows
